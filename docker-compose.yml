version: '3.8'

services:
  stratosfear:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stratosfear-game
    ports:
      - "${PORT:-6959}:6959"
      - "6969:6969"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-6959}
      - VITE_API_URL=http://localhost:${PORT:-6959}
      - VITE_GAME_SPEED=1.0
    volumes:
      - ./concept_base:/app/concept_base:ro
      - ./dist:/app/dist:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6959"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: stratosfear-network
